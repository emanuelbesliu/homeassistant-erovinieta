name: Validate Dependencies

on:
  pull_request:
    paths:
      - 'requirements.txt'
      - 'custom_components/erovinieta/manifest.json'
      - '.github/workflows/dependencies.yml'
  push:
    branches:
      - main
    paths:
      - 'requirements.txt'
      - 'custom_components/erovinieta/manifest.json'

jobs:
  validate:
    name: Validate Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Verify manifest.json requirements
        run: |
          # Ensure manifest.json has an empty requirements list
          # (all dependencies are HA built-ins: Pillow, aiohttp)
          REQS=$(python -c "
          import json
          reqs = json.load(open('custom_components/erovinieta/manifest.json'))['requirements']
          print(len(reqs))
          ")
          echo "Number of external requirements: $REQS"
          if [ "$REQS" -ne 0 ]; then
            echo "::error::manifest.json should have empty requirements (Pillow and aiohttp are HA built-ins)"
            exit 1
          fi
          echo "Dependencies validation passed — no external requirements needed"

      - name: Verify Pillow is available
        run: |
          pip install Pillow
          python -c "
          from PIL import Image
          print(f'Pillow available: {Image.__version__}')
          "

      - name: Create validation summary
        run: |
          echo "# Dependencies Validation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All dependencies validated successfully!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "This integration uses only HA built-in libraries:" >> $GITHUB_STEP_SUMMARY
          echo "- **Pillow** — captcha OCR via template matching" >> $GITHUB_STEP_SUMMARY
          echo "- **aiohttp** — HTTP requests" >> $GITHUB_STEP_SUMMARY
