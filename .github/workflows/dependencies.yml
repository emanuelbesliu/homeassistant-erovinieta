name: Validate Dependencies

on:
  pull_request:
    paths:
      - 'requirements.txt'
      - 'custom_components/erovinieta/manifest.json'
      - '.github/workflows/dependencies.yml'
  push:
    branches:
      - main
    paths:
      - 'requirements.txt'
      - 'custom_components/erovinieta/manifest.json'

jobs:
  validate:
    name: Validate Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify manifest.json requirements match
        run: |
          # Extract requirements from manifest.json
          MANIFEST_REQS=$(python -c "import json; print(' '.join(json.load(open('custom_components/erovinieta/manifest.json'))['requirements']))")

          echo "Manifest requirements: $MANIFEST_REQS"
          echo "requirements.txt:"
          cat requirements.txt | grep -v '^#' | grep -v '^$'

          # Check if required packages are in requirements.txt
          if ! grep -q "ddddocr" requirements.txt; then
            echo "ddddocr not found in requirements.txt"
            exit 1
          fi

          echo "Dependencies validation passed"

      - name: Test import
        run: |
          python -c "import ddddocr; print(f'ddddocr version: {ddddocr.__version__}')"
          echo "All dependencies can be imported"

      - name: Check for security vulnerabilities
        run: |
          pip install safety
          safety check --file requirements.txt --json || echo "Security check completed"
        continue-on-error: true

      - name: Create validation summary
        run: |
          echo "# Dependencies Validation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All dependencies validated successfully!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Installed Versions" >> $GITHUB_STEP_SUMMARY
          pip list | grep -E "ddddocr|onnxruntime" >> $GITHUB_STEP_SUMMARY || true
