---
name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout (on release)
        if: steps.release.outputs.release_created
        uses: actions/checkout@v6

      - name: Create release zip (on release)
        if: steps.release.outputs.release_created
        run: |
          cd custom_components/erovinieta
          zip -r "../../erovinieta-${{ steps.release.outputs.tag_name }}.zip" \
            *.py manifest.json strings.json \
            translations/ brand/
          cd ../..

      - name: Upload release asset
        if: steps.release.outputs.release_created
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.release.outputs.tag_name }}" \
            "erovinieta-${{ steps.release.outputs.tag_name }}.zip"
